<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chips & Pills</title>
<link rel="stylesheet" href="../cpb-base.css">
<style>
  body { padding: 22px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: var(--cpb-font-mono); font-size: 11px; color: var(--cpb-muted); width: 96px; }
</style></head>
<body>
  <div class="row"><span class="lbl">component</span>
    <span class="cpb-pill">Cyberdeck</span>
    <span class="cpb-pill">Neural Link</span>
    <span class="cpb-pill">Sandevistan</span>
  </div>
  <div class="row"><span class="lbl">state</span>
    <span class="cpb-chip">Inactive</span>
    <span class="cpb-chip cpb-chip--active">Active</span>
    <span class="cpb-chip cpb-chip--always">Always Active</span>
    <span class="cpb-chip cpb-chip--disabled">Disabled</span>
    <span class="cpb-chip cpb-chip--error">Mortal Wound</span>
  </div>
  <div class="row"><span class="lbl">tag</span>
    <span class="cpb-chip">Cyberware</span>
    <span class="cpb-chip">Mod</span>
    <span class="cpb-chip">Drug</span>
    <span class="cpb-chip">Program</span>
  </div>
</body></html>
